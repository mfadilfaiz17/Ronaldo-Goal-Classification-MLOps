name: Data Preprocessing Automation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  run-preprocessing:
    runs-on: ubuntu-latest
    
    # Menambahkan permission 
    permissions:
      contents: write 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas

    - name: Run Preprocessing Script
      run: |
        # Masuk ke folder Preprocessing dan jalankan skrip
        cd Preprocessing
        python automate_Faiz.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        # Cek apakah ada perubahan data, jika ada maka commit dan push
        git diff --quiet && git diff --staged --quiet || (git commit -m "auto: menyimpan hasil preprocessing terbaru" && git push)